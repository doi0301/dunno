<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fff6dd" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>DUNNO - 어디뒀더라</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icons/icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/icons/icon-192.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Nunito:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-b" aria-hidden="true"></div>

    <main class="app-shell">
      <header class="app-header">
        <h1>어디뒀더라</h1>
        <p class="subcopy">물건 위치와 재고를 한눈에 정리해요.</p>
      </header>

      <section class="search-section" aria-label="검색 영역">
        <input
          id="searchInput"
          type="search"
          placeholder="이름 또는 위치 검색"
          autocomplete="off"
        />
      </section>

      <section class="view-toggle-section" aria-label="그룹 보기 전환">
        <div class="view-toggle-row">
          <div class="view-toggle" id="viewToggle" role="tablist" aria-label="그룹 기준">
            <button type="button" class="view-tab active" data-view="category" role="tab" aria-selected="true">
              카테고리별
            </button>
            <button type="button" class="view-tab" data-view="location" role="tab" aria-selected="false">
              위치별
            </button>
          </div>
          <div class="settings-actions">
            <button id="locationSettingsBtn" type="button" class="tiny-btn settings-btn">위치 설정</button>
            <button id="categorySettingsBtn" type="button" class="tiny-btn settings-btn">카테고리 설정</button>
          </div>
        </div>
      </section>

      <section class="chip-section" aria-label="카테고리 필터">
        <div id="categoryChips" class="chip-list"></div>
      </section>

      <section id="locationSubFilters" class="sub-filter-section" aria-label="위치 하위 필터" hidden>
        <label for="locationFurnitureFilter" class="sub-filter-label">장소 필터</label>
        <div class="sub-filter-select-wrap">
          <select id="locationFurnitureFilter" aria-label="장소 필터"></select>
        </div>
      </section>

      <section class="list-section" aria-label="아이템 목록">
        <div id="itemList" class="item-list"></div>
        <div id="mainScrollbar" class="main-scrollbar" aria-hidden="true">
          <div id="mainScrollbarTrack" class="main-scrollbar-track">
            <div id="mainScrollbarThumb" class="main-scrollbar-thumb"></div>
          </div>
        </div>
      </section>
    </main>

    <button id="fabAdd" class="fab" type="button" aria-label="물건 추가">+</button>

    <dialog id="itemDialog" class="item-dialog">
      <form id="itemForm" method="dialog" class="item-form">
        <h2 id="dialogTitle">물건 추가</h2>

        <label>
          이름
          <input id="nameInput" name="name" type="text" list="nameList" required />
          <datalist id="nameList"></datalist>
        </label>

        <div class="location-type-grid" aria-label="위치 정보 입력">
          <label>
            방
            <select id="locationRoomInput" name="locationRoom" required>
              <option value="거실">거실</option>
              <option value="침실">침실</option>
              <option value="주방">주방</option>
              <option value="욕실">욕실</option>
              <option value="베란다">베란다</option>
              <option value="현관">현관</option>
              <option value="서재">서재</option>
              <option value="기타">기타</option>
            </select>
          </label>

          <label>
            가구
            <input id="locationFurnitureInput" name="locationFurniture" type="text" list="locationFurnitureList" placeholder="예: 서랍장" required />
            <datalist id="locationFurnitureList"></datalist>
          </label>

          <label>
            상세위치
            <input id="locationDetailInput" name="locationDetail" type="text" list="locationDetailList" placeholder="예: 2번째 칸" />
            <datalist id="locationDetailList"></datalist>
          </label>
        </div>

        <label>
          카테고리
          <select id="categoryInput" name="category" required></select>
        </label>

        <label>
          수량
          <input id="quantityInput" name="quantity" type="number" min="1" value="1" required />
        </label>

        <label>
          메모
          <textarea id="memoInput" name="memo" rows="3" placeholder="선택 입력"></textarea>
        </label>

        <div class="image-mode-block" aria-label="이미지 입력 유형">
          <p class="field-title">이미지 유형</p>
          <div class="image-mode-toggle" id="imageModeToggle" role="tablist" aria-label="이미지 입력 유형 선택">
            <button type="button" class="image-mode-tab active" data-image-mode="url" role="tab" aria-selected="true">
              이미지 URL
            </button>
            <button type="button" class="image-mode-tab" data-image-mode="upload" role="tab" aria-selected="false">
              이미지 업로드
            </button>
          </div>
        </div>

        <div id="imageUrlGroup">
          <label>
            이미지 검색어 또는 URL
            <input id="imageUrlInput" name="imageUrl" type="text" placeholder="예: passport 또는 https://..." />
          </label>
        </div>

        <div id="imageUploadGroup" hidden>
          <div class="image-input-section" aria-label="이미지 입력 방식">
            <p class="field-title">이미지 선택</p>
            <div class="image-upload-actions">
              <button type="button" id="pickUploadBtn" class="tiny-btn">파일에서 선택</button>
              <button type="button" id="pickCaptureBtn" class="tiny-btn">카메라 촬영</button>
            </div>
            <p class="image-upload-help">휴대폰에서는 카메라 버튼으로 바로 촬영할 수 있어요.</p>
            <input id="imageUploadInput" type="file" accept="image/*" hidden />
            <input id="imageCaptureInput" type="file" accept="image/*" capture="environment" hidden />
          </div>

          <div class="image-preview-box" id="imagePreviewBox" aria-live="polite">
            <img id="imagePreview" alt="선택한 이미지 미리보기" hidden />
            <p id="imagePreviewHint">이미지 업로드 또는 사진 촬영을 선택하면 미리보기가 표시돼요.</p>
            <button type="button" id="clearImageBtn" class="tiny-btn" hidden>이미지 선택 해제</button>
          </div>
        </div>

        <p id="formError" class="form-error" role="alert" aria-live="polite"></p>

        <div class="dialog-actions">
          <button id="cancelBtn" type="button" class="ghost">취소</button>
          <button id="submitBtn" type="submit" class="primary">저장</button>
        </div>
      </form>
    </dialog>

    <dialog id="categorySettingsDialog" class="item-dialog">
      <form method="dialog" class="item-form">
        <h2>카테고리 설정</h2>

        <label>
          관리할 카테고리
          <select id="categoryManageSelect"></select>
        </label>

        <div class="category-custom-row" aria-label="카테고리 직접 추가">
          <input id="customCategoryInput" type="text" placeholder="새 카테고리 이름" />
          <button id="addCategoryBtn" type="button" class="tiny-btn">카테고리 추가</button>
        </div>

        <div class="category-manage-block" aria-label="카테고리 관리">
          <p class="field-title">선택한 카테고리 관리</p>
          <div class="category-manage-row">
            <input id="renameCategoryInput" type="text" placeholder="변경할 이름" />
            <button id="renameCategoryBtn" type="button" class="tiny-btn">이름 변경</button>
            <button id="deleteCategoryBtn" type="button" class="tiny-btn danger">삭제</button>
          </div>
        </div>

        <div class="dialog-actions">
          <button id="closeCategorySettingsBtn" type="button" class="ghost">닫기</button>
        </div>
      </form>
    </dialog>

    <dialog id="locationSettingsDialog" class="item-dialog">
      <form method="dialog" class="item-form">
        <h2>위치 설정</h2>

        <label>
          관리할 방
          <select id="roomManageSelect"></select>
        </label>

        <div class="category-custom-row" aria-label="방 직접 추가">
          <input id="addRoomInput" type="text" placeholder="새 방 이름" />
          <button id="addRoomBtn" type="button" class="tiny-btn">방 추가</button>
        </div>

        <div class="category-manage-block" aria-label="방 관리">
          <p class="field-title">선택한 방 관리</p>
          <div class="category-manage-row">
            <input id="renameRoomInput" type="text" placeholder="변경할 방 이름" />
            <button id="renameRoomBtn" type="button" class="tiny-btn">이름 변경</button>
            <button id="deleteRoomBtn" type="button" class="tiny-btn danger">삭제</button>
          </div>
        </div>

        <div class="dialog-actions">
          <button id="closeLocationSettingsBtn" type="button" class="ghost">닫기</button>
        </div>
      </form>
    </dialog>

    <div id="undoToast" class="undo-toast" role="status" aria-live="polite" hidden>
      <span id="undoToastText">물건이 삭제됐어요.</span>
      <button id="undoDeleteBtn" type="button" class="tiny-btn">되돌리기</button>
    </div>

    <script src="./app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {
            // service worker registration failure is non-fatal for app usage
          });
        });
      }
    </script>
  </body>
</html>
